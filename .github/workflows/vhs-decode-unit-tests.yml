name: Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  vhs-decode-unit-tests:
    name: vhs-decode Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
          submodules: recursive

    - uses: ./.github/actions/setup-test-env
      with:
        python-version: "3.13"

    - name: Run unit tests
      timeout-minutes: 5
      # Run from /tmp so Python imports the installed package (with compiled
      # Cython/Rust extensions) rather than the source tree.
      shell: bash
      run: |
        cd /tmp
        $GITHUB_WORKSPACE/tests/run_unit.sh

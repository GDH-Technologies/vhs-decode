name: Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  vhs-decode-integration-tests:
    # Decodes and validates supported formats and flags using real RF samples
    name: vhs-decode Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
          submodules: recursive

    - uses: ./.github/actions/setup-test-env
      with:
        python-version: "3.13"

    - name: Run smoke tests
      timeout-minutes: 60
      shell: bash
      run: |
        $GITHUB_WORKSPACE/tests/run_integration.sh
